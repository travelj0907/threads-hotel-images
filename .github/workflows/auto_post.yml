name: Threads 自動投稿

on:
  schedule:
    - cron: '0 23 * * *'   # JST 8:00  (UTC 23:00 前日)
    - cron: '0 3 * * *'    # JST 12:00 (UTC 3:00)
    - cron: '0 9 * * *'    # JST 18:00 (UTC 9:00)
    - cron: '0 11 * * *'   # JST 20:00 (UTC 11:00)
  workflow_dispatch:         # 手動実行ボタン（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: Threadsへ自動投稿
        run: python main.py --auto
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          PYTHONUTF8: 1

      - name: hotels.csv を更新してコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hotels.csv
          git diff --staged --quiet || git commit -m "Update hotels.csv [skip ci]"
          git push
