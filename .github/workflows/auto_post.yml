name: Threads 自動投稿

on:
  schedule:
    - cron: '30 23 * * *'  # JST 8:30  (UTC 23:30 前日)
    - cron: '30 2 * * *'   # JST 11:30 (UTC 2:30)
    - cron: '30 8 * * *'   # JST 17:30 (UTC 8:30)
    - cron: '30 10 * * *'  # JST 19:30 (UTC 10:30)
  workflow_dispatch:         # 手動実行ボタン（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: Threadsへ自動投稿
        run: |
          echo "実行日時: $(date '+%Y-%m-%d %H:%M:%S UTC') (JST: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S'))"
          python main.py --auto
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          PYTHONUTF8: 1

      - name: hotels.csv を更新してコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hotels.csv
          git diff --staged --quiet || git commit -m "Update hotels.csv [skip ci]"
          git push
